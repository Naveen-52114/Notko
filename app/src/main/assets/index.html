<!DOCTYPE html>

  <!-- Mobile top bar -->

    <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>

  <!-- Main Content -->

<!-- Material Viewer Modal -->

  <div class="modal-backdrop"></div>
  <div class="modal-container">
    <div class="modal-header">

      <button id="viewer-close" class="modal-close" aria-label="Close">✕</button>

  </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script type="module" src="db.js"></script>

<script>
  function loadAppScripts() {
    const scripts = [
      'auth.js?v=' + Date.now(),
      'router.js?v=' + Date.now(),
      'home.js?v=' + Date.now(),
      'departments.js?v=' + Date.now(),
      'labManuals.js?v=' + Date.now(),
      'saved.js?v=' + Date.now(),
      'upload.js?v=' + Date.now(),
      'login.js?v=' + Date.now(),
      'viewer.js?v=' + Date.now(),
      'app.js?v=' + Date.now()
    ];
    let chain = Promise.resolve();
    scripts.forEach(src => {
      chain = chain.then(() => new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
      }));
    });
  }
  window.addEventListener('db-ready', loadAppScripts, { once: true });
</script>

<script>
  /* ===============================
     📥 DOWNLOAD FUNCTION (FIXED)
  ================================ */
  function downloadFile(url, fileName = "file.pdf") {

    // ✅ NORMAL HTTP URL → use Android bridge (anchor click doesn't work in WebView)
    if (url.startsWith("http")) {
      if (window.Android) {
        Android.downloadUrl(url, fileName);
      } else {
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        a.click();
      }
      return;
    }

    // ✅ BASE64 FILE
    if (url.startsWith("data:")) {
      if (window.Android) {
        Android.downloadBase64(url, "application/pdf", fileName);
      } else {
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        a.click();
      }
      return;
    }

    // ✅ BLOB → convert to base64 first, then send to Android
    if (url.startsWith("blob:")) {
      fetch(url)
        .then(res => res.blob())
        .then(blob => {
          const reader = new FileReader();
          reader.onloadend = function () {
            if (window.Android) {
              Android.downloadBase64(reader.result, "application/pdf", fileName);
            }
          };
          reader.readAsDataURL(blob);
        });
    }
  }

  /* ===============================
     👁️ VIEW PDF FUNCTION
  ================================ */
  function viewFile(url, fileName = "file.pdf") {

    // ✅ NORMAL URL
    if (url.startsWith("http")) {
      window.open(url, "_blank");
      return;
    }

    // ✅ BASE64
    if (url.startsWith("data:")) {
      if (window.Android) {
        Android.openFile(url, "application/pdf", fileName);
      } else {
        window.open(url);
      }
      return;
    }

    // ✅ BLOB → convert then open
    if (url.startsWith("blob:")) {
      fetch(url)
        .then(res => res.blob())
        .then(blob => {
          const reader = new FileReader();
          reader.onloadend = function () {
            if (window.Android) {
              Android.openFile(reader.result, "application/pdf", fileName);
            }
          };
          reader.readAsDataURL(blob);
        });
    }
  }
</script>

</body>
</html>
